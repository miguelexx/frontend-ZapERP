<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280" viewBox="0 0 280 280">
  <defs>
    <pattern id="wa-doodles" x="0" y="0" width="280" height="280" patternUnits="userSpaceOnUse">
      <!-- Padrão sutil estilo WhatsApp — doodles em linhas finas, opacidade via CSS -->
      <!-- Globo -->
      <circle cx="35" cy="25" r="10" fill="none" stroke="#000" stroke-width="0.9"/>
      <ellipse cx="35" cy="25" rx="5" ry="10" fill="none" stroke="#000" stroke-width="0.9"/>
      <line x1="25" y1="25" x2="45" y2="25" stroke="#000" stroke-width="0.9"/>
      <!-- Avião -->
      <path d="M140 40 L165 55 L140 52 L115 55 Z" fill="none" stroke="#000" stroke-width="0.9"/>
      <!-- Bússola -->
      <circle cx="220" cy="45" r="12" fill="none" stroke="#000" stroke-width="0.9"/>
      <path d="M220 33 L223 45 L220 57 L217 45 Z" fill="none" stroke="#000" stroke-width="0.9"/>
      <!-- Baleia -->
      <ellipse cx="50" cy="95" rx="18" ry="8" fill="none" stroke="#000" stroke-width="0.9"/>
      <path d="M68 95 L78 92 L78 98 Z" fill="none" stroke="#000" stroke-width="0.9"/>
      <!-- Flor -->
      <circle cx="180" cy="100" r="4" fill="none" stroke="#000" stroke-width="0.9"/>
      <ellipse cx="180" cy="92" rx="3" ry="6" fill="none" stroke="#000" stroke-width="0.9"/>
      <ellipse cx="187" cy="100" rx="6" ry="3" fill="none" stroke="#000" stroke-width="0.9"/>
      <ellipse cx="180" cy="108" rx="3" ry="6" fill="none" stroke="#000" stroke-width="0.9"/>
      <ellipse cx="173" cy="100" rx="6" ry="3" fill="none" stroke="#000" stroke-width="0.9"/>
      <!-- Sol -->
      <circle cx="240" cy="120" r="6" fill="none" stroke="#000" stroke-width="0.9"/>
      <line x1="240" y1="110" x2="240" y2="130" stroke="#000" stroke-width="0.9"/>
      <line x1="230" y1="120" x2="250" y2="120" stroke="#000" stroke-width="0.9"/>
      <line x1="234" y1="114" x2="246" y2="126" stroke="#000" stroke-width="0.9"/>
      <line x1="234" y1="126" x2="246" y2="114" stroke="#000" stroke-width="0.9"/>
      <!-- Cacto -->
      <rect x="65" y="155" width="8" height="25" rx="2" fill="none" stroke="#000" stroke-width="0.9"/>
      <ellipse cx="69" cy="150" rx="10" ry="6" fill="none" stroke="#000" stroke-width="0.9"/>
      <ellipse cx="62" cy="165" rx="5" ry="4" fill="none" stroke="#000" stroke-width="0.9"/>
      <ellipse cx="76" cy="168" rx="5" ry="4" fill="none" stroke="#000" stroke-width="0.9"/>
      <!-- Folha -->
      <path d="M160 165 Q175 155 180 165 Q175 175 160 175 Q165 165 160 165" fill="none" stroke="#000" stroke-width="0.9"/>
      <!-- Relógio -->
      <circle cx="35" cy="210" r="11" fill="none" stroke="#000" stroke-width="0.9"/>
      <line x1="35" y1="210" x2="35" y2="202" stroke="#000" stroke-width="0.9"/>
      <line x1="35" y1="210" x2="41" y2="214" stroke="#000" stroke-width="0.9"/>
      <!-- Coração em balão -->
      <path d="M110 225 L115 220 Q120 215 122 220 Q125 215 130 220 L135 225 Q120 240 110 225" fill="none" stroke="#000" stroke-width="0.9"/>
      <!-- Câmera -->
      <rect x="195" y="200" width="22" height="16" rx="2" fill="none" stroke="#000" stroke-width="0.9"/>
      <circle cx="206" cy="208" r="4" fill="none" stroke="#000" stroke-width="0.9"/>
      <rect x="200" y="196" width="6" height="4" rx="1" fill="none" stroke="#000" stroke-width="0.9"/>
      <!-- Casa -->
      <path d="M255 255 L255 235 L265 225 L275 235 L275 255 L255 255" fill="none" stroke="#000" stroke-width="0.9"/>
      <path d="M262 225 L262 245" fill="none" stroke="#000" stroke-width="0.9"/>
      <!-- Estrela -->
      <path d="M70 250 L73 258 L82 259 L75 265 L77 274 L70 269 L63 274 L65 265 L58 259 Z" fill="none" stroke="#000" stroke-width="0.9"/>
      <!-- Chat/balão -->
      <path d="M185 260 Q185 252 193 252 L205 252 Q213 252 213 260 L213 268 Q213 276 205 276 L197 276 L193 282 L195 276 Q185 276 185 268 Z" fill="none" stroke="#000" stroke-width="0.9"/>
    </pattern>
  </defs>
  <rect width="280" height="280" fill="url(#wa-doodles)"/>
</svg>
